llm_interface:
  ros__parameters:
    planning_service_name: '/llm_interface/plan_subtree'
    selection_service_name: '/llm_interface/select_behavior_tree'
    mission_requirements_service_name: '/llm_interface/extract_mission_requirements'
    provider: 'openrouter'  # options: gemini | openai | openrouter
    selection_provider: 'openrouter' 
    mission_requirements_provider: 'openrouter'
    payload_provider: 'openrouter'  
    payload_normalizer_provider: 'openrouter'  
    model_name: 'nvidia/nemotron-3-ultra-550b-a55b:free'  # provider-specific model id; examples: gemini-3.1-flash-lite-preview | gpt-4o-mini | openai/gpt-4o-mini | stepfun/step-3.5-flash:free
    selection_model_name: 'nvidia/nemotron-3-ultra-550b-a55b:free'
    mission_requirements_model_name: 'google/gemini-3.5-flash'
    payload_model_name: 'google/gemini-3.5-flash'  
    payload_normalizer_model_name: 'nvidia/nemotron-3-ultra-550b-a55b:free' 
    openrouter_app_url: ''  # optional OpenRouter attribution URL
    openrouter_app_title: 'generalist_bt_gen'  # optional OpenRouter attribution title
    selection_llm_enabled: true
    mission_requirements_llm_enabled: true
    selection_temperature: 0.0
    selection_timeout_sec: 10.0
    mission_requirements_temperature: 0.0
    payload_multimodal_enabled: true
    payload_max_attachment_bytes: 5000000
    payload_max_attachments: 6
    payload_attachment_allowlist:
      - 'image/png'
      - 'image/jpeg'
    payload_schema_enforced: true
    payload_schema_max_retries: 1
    prompts:
      selection: |
        You are a mission planner for a field robot. Given USER_COMMAND and a JSON array of
        behavior trees (each with id + description), choose the best tree or return NONE.
        tree_id MUST be exactly one of the string IDs in TREES_JSON (e.g., "temperature_logging.xml").
        Do NOT answer with numeric indexes.
        Respond strictly as JSON: {{"tree_id": "<id or NONE>", "confidence": 0-1, "rationale": "..."}}
        USER_COMMAND: {user_command}
        TREES_JSON: {trees_json}
      mission_requirements: |
        You extract robot mission requirements from natural language. Return only JSON.
        Use capability IDs exactly as they appear in CAPABILITY_CATALOG_JSON when possible.
        Do not decide whether the mission is safe or executable; only classify what the user asks for.

        USER_COMMAND: {user_command}

        CONTEXT_JSON: {context_json}

        CAPABILITY_CATALOG_JSON: {capability_catalog_json}

        TREE_CATALOG_JSON: {tree_catalog_json}

        Return JSON with this shape:
        {{
          "required_capabilities": ["capability.id"],
          "mission_intents": ["intent_id"],
          "constraints": {{"range_m": null, "duration_s": null}},
          "ambiguities": ["short operator-facing ambiguity"],
          "rationale": "brief explanation"
        }}
      payload:
        default: |
          You are a robot mission planner for a mobile field robot type Husky A200. Given CONTEXT (sensor data) and CONTRACT (required
          blackboard keys), generate a JSON payload for the behavior tree.

          SUBTREE_ID: {subtree_id}
          USER_COMMAND: {user_command}

          CONTEXT (raw sensor data):
          {context_json}

          CONTRACT (required blackboard keys with types/defaults):
          {contract_json}

          ATTACHMENT_URIS: {attachment_uris}

          INSTRUCTIONS:
          1. Map context data to blackboard keys specified in the contract
          2. Use contract defaults when context is missing
          3. Infer reasonable values from context (e.g., extract waypoints from GPS trail)
          4. If images are provided, use them to extract map/goal information
          5. Return ONLY valid JSON matching the contract schema
          6. Do NOT include markdown code fences

          OUTPUT (JSON only):
      payload_normalizer: |
        You are a strict JSON schema enforcer for robot mission payloads.
        Compare MODEL_OUTPUT against CONTRACT_SCHEMA and correct/normalize it to strictly match.
        Use defaults in the contract when values are missing. If a value is missing and no default
        is provided, infer from the ORIGINAL_PROMPT context when reasonable; otherwise set null.
        If the MODEL_OUTPUT already matches the schema, return it unchanged.
        Return ONLY a valid JSON object (no markdown).

        ORIGINAL_PROMPT:
        {payload_prompt}

        CONTRACT_SCHEMA:
        {contract_json}

        MODEL_OUTPUT:
        {raw_payload}

        NORMALIZED_OUTPUT (JSON only):
    default_bt_template: |
      <root BTCPP_format="4" main_tree_to_execute="MainTree">
        <BehaviorTree ID="MainTree">
          <Sequence>
            <AlwaysSuccess name="Acknowledge_{mission_text}" />
          </Sequence>
        </BehaviorTree>
      </root>
