# Tree Metadata Configuration
# Defines context requirements and blackboard contracts for behavior trees

trees:
  - id: "temperature_logging.xml"
    description: "Navigate through waypoints and log temperature at each waypoint."
    mission_intents:
      - "navigate_waypoints"
      - "log_temperature"
    required_capabilities:
      - "locomotion.ground"
      - "navigation.waypoints"
      - "sensing.temperature"
      - "payload.parse_waypoints"
    unsupported_requirements:
      - "locomotion.flight"
      - "sensing.thermal_image"
      - "manipulation.pick_place"
      - "sampling.soil"
    selection_constraints:
      max_range_m: 5000
    context_requirements: [ROBOT_POSE, GPS_FIX, ANNOTATED_SLAM_MAP_IMAGE, OSM_CONTEXT, SATELLITE_MAP] #RGB360SWEEP
    blackboard_contract:
      waypoints:
        type: "string"
        required: true
        default: ""
        schema:
          type: "string"
          description: "Semicolon-separated waypoints, each formatted as 'x,y,yaw' (meters, meters, radians)."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
          examples:
            - "1.0,2.0,0.0; 3.5,4.2,1.57"
      logfile_path:
        type: "string"
        required: false
        default: "/tmp/temperature_log.txt"

  - id: "navigate_and_photograph.xml"
    description: "Navigate to waypoints and take photos at regular intervals"
    mission_intents:
      - "navigate_waypoints"
      - "photograph_route"
      - "document_area"
    required_capabilities:
      - "locomotion.ground"
      - "navigation.waypoints"
      - "sensing.rgb_image"
      - "localization.gps"
    unsupported_requirements:
      - "locomotion.flight"
      - "sensing.thermal_image"
      - "manipulation.pick_place"
      - "sampling.soil"
    selection_constraints:
      max_range_m: 5000
      requires_target_area_or_route: true
    context_requirements: [ROBOT_POSE, RGB_IMAGE, GPS_FIX]
    blackboard_contract:
      waypoints:
        type: "string"
        required: true
        schema:
          type: "string"
          description: "Semicolon-separated waypoints, each formatted as 'x,y,yaw' (meters, meters, radians)."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
          examples:
            - "0.0,0.0,0.0; 5.0,1.0,0.0"
      photo_interval_m:
        type: "double"
        required: false
        default: 5.0
      camera_topic:
        type: "string"
        required: false
        default: "/a200_0000/sensors/camera_0/color/image"
      odom_topic:
        type: "string"
        required: false
        default: "/odom"
      photo_output_directory:
        type: "string"
        required: false
        default: "/tmp/robot_actions/photos"
      photo_filename_prefix:
        type: "string"
        required: false
        default: "mission_photo"
      image_timeout_ms:
        type: "int"
        required: false
        default: 1000
      odom_timeout_ms:
        type: "int"
        required: false
        default: 50

  - id: "explore_area.xml"
    description: "Autonomous exploration of an unknown area with obstacle avoidance"
    mission_intents:
      - "explore_area"
      - "survey_area"
    required_capabilities:
      - "locomotion.ground"
      - "navigation.waypoints"
      - "localization.odometry"
      - "mapping.slam"
    unsupported_requirements:
      - "locomotion.flight"
      - "sensing.thermal_image"
      - "manipulation.pick_place"
      - "sampling.soil"
    selection_constraints:
      max_radius_m: 50
      min_battery_percent: 20
    context_requirements:
      - ROBOT_POSE
      - POINTCLOUD
      - BATTERY_STATE
    blackboard_contract:
      exploration_radius_m:
        type: "double"
        required: false
        default: 50.0
      min_battery_percent:
        type: "double"
        required: false
        default: 20.0
      return_home_on_low_battery:
        type: "bool"
        required: false
        default: true
