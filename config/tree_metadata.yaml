# Tree Metadata Configuration
# Defines context requirements and blackboard contracts for behavior trees

trees:
  - id: "temperature_logging.xml"
    description: "Navigate through waypoints and log temperature at each waypoint."
    mission_intents:
      - "navigate_waypoints"
      - "log_temperature"
    required_capabilities:
      - "localization.gps"
      - "locomotion.ground"
      - "navigation.waypoints"
      - "sensing.temperature"
      - "payload.parse_waypoints"
    unsupported_requirements:
      - "locomotion.flight"
      - "sensing.thermal_image"
      - "manipulation.pick_place"
      - "sampling.soil"
    selection_constraints:
      max_range_m: 5000
    context_requirements: [ROBOT_POSE, GPS_FIX, ANNOTATED_SLAM_MAP_IMAGE, OSM_CONTEXT, SATELLITE_MAP] #RGB360SWEEP
    blackboard_contract:
      waypoints:
        type: "string"
        required: true
        default: ""
        schema:
          type: "string"
          description: "Semicolon-separated waypoints, each formatted as 'x,y,yaw' (meters, meters, radians)."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
          examples:
            - "1.0,2.0,0.0; 3.5,4.2,1.57"
      logfile_path:
        type: "string"
        required: false
        default: "/tmp/temperature_log.txt"

  - id: "navigate_and_photograph.xml"
    description: "Navigate to waypoints and take photos at regular intervals"
    mission_intents:
      - "navigate_waypoints"
      - "photograph_route"
      - "document_area"
    required_capabilities:
      - "locomotion.ground"
      - "navigation.waypoints"
      - "sensing.rgb_image"
      - "localization.gps"
    unsupported_requirements:
      - "locomotion.flight"
      - "sensing.thermal_image"
      - "manipulation.pick_place"
      - "sampling.soil"
    selection_constraints:
      max_range_m: 5000
      requires_target_area_or_route: true
    context_requirements: [ROBOT_POSE, RGB_IMAGE, GPS_FIX]
    blackboard_contract:
      waypoints:
        type: "string"
        required: true
        schema:
          type: "string"
          description: "Semicolon-separated waypoints, each formatted as 'x,y,yaw' (meters, meters, radians)."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
          examples:
            - "0.0,0.0,0.0; 5.0,1.0,0.0"
      photo_interval_m:
        type: "double"
        required: false
        default: 5.0
      camera_topic:
        type: "string"
        required: false
        default: "/a200_0000/sensors/camera_0/color/image"
      odom_topic:
        type: "string"
        required: false
        default: "/odom"
      photo_output_directory:
        type: "string"
        required: false
        default: "/tmp/robot_actions/photos"
      photo_filename_prefix:
        type: "string"
        required: false
        default: "mission_photo"
      image_timeout_ms:
        type: "int"
        required: false
        default: 1000
      odom_timeout_ms:
        type: "int"
        required: false
        default: 50

  - id: "explore_area.xml"
    description: "Explore an operator-defined ground area by executing LLM-generated map-frame frontier or coverage waypoints."
    mission_intents:
      - "explore_area"
      - "survey_area"
    required_capabilities:
      - "locomotion.ground"
      - "navigation.waypoints"
      - "localization.odometry"
      - "mapping.slam"
      - "payload.parse_waypoints"
    unsupported_requirements:
      - "locomotion.flight"
      - "sensing.thermal_image"
      - "manipulation.pick_place"
      - "sampling.soil"
    selection_constraints:
      max_radius_m: 50
      min_battery_percent: 20
      requires_target_area: true
    context_requirements:
      - ROBOT_POSE
      - ANNOTATED_SLAM_MAP_IMAGE
      - GPS_FIX
      - SATELLITE_MAP
      - OSM_CONTEXT
      - BATTERY_STATE
    blackboard_contract:
      waypoints:
        type: "string"
        required: true
        schema:
          type: "string"
          description: "Executable semicolon-separated map-frame route. Each waypoint is 'x,y,yaw' in meters/meters/radians."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
          examples:
            - "1.0,2.0,0.0; 4.0,2.0,1.57; 4.0,5.0,3.14"
      area_polygon:
        type: "string"
        required: true
        schema:
          type: "string"
          description: "Operator-defined exploration polygon in the map frame. Each vertex is 'x,y'. At least three vertices are required."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?){2,}$'
          examples:
            - "0.0,0.0; 8.0,0.0; 8.0,6.0; 0.0,6.0"
      frontiers:
        type: "string"
        required: true
        schema:
          type: "string"
          description: "Selected frontier or coverage points in the map frame. Each point is 'x,y,yaw'."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
          examples:
            - "2.0,1.0,0.0; 6.0,3.0,1.57"
      area_polygon_geo:
        type: "string"
        required: false
        schema:
          type: "string"
          description: "Optional satellite/geographic polygon vertices formatted as 'lat,lon'."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?){2,}$'
      frontiers_geo:
        type: "string"
        required: false
        schema:
          type: "string"
          description: "Optional satellite/geographic frontier points formatted as 'lat,lon'."
          pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?(\s*;\s*-?\d+(\.\d+)?,-?\d+(\.\d+)?)*$'
      exploration_strategy:
        type: "string"
        required: false
        default: "frontier_coverage"
      min_battery_percent:
        type: "double"
        required: false
        default: 20.0
      return_home_on_low_battery:
        type: "bool"
        required: false
        default: true
